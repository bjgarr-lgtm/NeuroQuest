<!doctype html><html lang='en'><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width, initial-scale=1'/><title>Sprout</title><link rel='manifest' href='/manifest.webmanifest'/><link rel='stylesheet' href='/styles.css'/></head><body><header class='site-header'><div class='brand'><img src='/assets/img/logo.svg' class='logo'/><div class='titles'><h1>Sprout</h1><p class='subtitle'>cozy goals with a buddy</p></div></div><nav class='top-nav'><button class='icon-btn' id='btnMute'>🔈</button></nav></header><main id='app'><section class='screen' id='screen-onboard'><div class='card hero'><h2>hi — i’m your buddy</h2><div id='buddyChoices'></div><div class='row'><button class='btn primary' id='startDay'>start my day</button></div></div></section><section class='screen hidden' id='screen-home'><div class='grid'><div class='card pet'><div class='pet-wrap'><img id='petImg' src='/assets/img/bird-teal-1.svg'/><div class='level'><span id='levelText'>Lv 1</span></div></div><div class='row center compact'><div class='chip'>⭐ <span id='xpText'>0</span></div><div class='chip'>🪙 <span id='coinText'>0</span></div><div class='chip'>🔥 <span id='streakText'>0</span> streak</div></div><div class='row center'><button class='btn' id='toCheckIn'>mood check-in</button><button class='btn' id='toBreath'>breathing</button></div></div><div class='card'><h3>today’s tiny goals</h3><div id='taskList' class='task-list'></div><div class='row'><button class='btn' id='addTask'>+ add goal</button><button class='btn primary' id='quickStart'>start 10-min timer</button></div></div><div class='card shop'><h3>shop</h3><div id='shopList' class='shop-list'></div></div></div></section><section class='screen hidden' id='screen-checkin'><div class='card'><h3>how are you feeling?</h3><div class='moods'><button class='mood' data-v='energized'>⚡ energized</button><button class='mood' data-v='calm'>🌿 calm</button><button class='mood' data-v='meh'>😐 meh</button><button class='mood' data-v='anxious'>🌀 anxious</button></div><textarea id='journal' class='input' placeholder='optional note…'></textarea><div class='row'><button class='btn' id='saveCheckin'>save</button><button class='btn' id='backHome1'>back</button></div></div></section><section class='screen hidden' id='screen-breath'><div class='card center'><h3>box breathing</h3><canvas id='breathCanvas' width='320' height='320'></canvas><div class='row center'><button class='btn' id='breathStart'>start</button><button class='btn' id='breathStop'>stop</button><button class='btn' id='backHome2'>back</button></div></div></section><div id='toast' class='toast hidden'>+5 XP</div></main><footer class='site-footer'><p>© 2025 Sprout</p></footer><script src='/app.js'></script><script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}</script></body></html>
